<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet">
  <rect width="1600" height="1000" fill="#080808"/>

  <!-- Section label -->
  <text x="800" y="132" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" letter-spacing="14" fill="#00c8ff" font-weight="600">PROGRESS</text>

  <!-- Big percentage number -->
  <text x="800" y="490" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900">
    <tspan font-size="320" fill="#00c8ff" letter-spacing="2">38</tspan>
    <tspan font-size="160" fill="#666666" dx="8">%</tspan>
  </text>

  <!-- Course completion label -->
  <text x="800" y="580" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" letter-spacing="18" fill="#888888" font-weight="500">COURSE COMPLETION</text>

  <!-- Progress dots track (10 dots: 4 completed cyan, 6 empty) -->
  <g transform="translate(0,720)">
    <line x1="200" y1="0" x2="1400" y2="0" stroke="#333333" stroke-width="3"/>
    <circle cx="200" cy="0" r="32" fill="#00c8ff"/>
    <circle cx="333" cy="0" r="32" fill="#00c8ff"/>
    <circle cx="467" cy="0" r="32" fill="#00c8ff"/>
    <circle cx="600" cy="0" r="32" fill="#00c8ff"/>
    <circle cx="733" cy="0" r="32" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="3"/>
    <circle cx="867" cy="0" r="32" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="3"/>
    <circle cx="1000" cy="0" r="32" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="3"/>
    <circle cx="1133" cy="0" r="32" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="3"/>
    <circle cx="1267" cy="0" r="32" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="3"/>
    <circle cx="1400" cy="0" r="32" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="3"/>
  </g>

  <!-- Detail text -->
  <text x="800" y="900" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif" font-size="36" letter-spacing="6">
    <tspan fill="#888888" font-weight="500">読了</tspan>
    <tspan fill="#ffffff" font-weight="900" font-family="'Arial Black', sans-serif" font-size="56" dx="14">11</tspan>
    <tspan fill="#444444" dx="14">/  全</tspan>
    <tspan fill="#ffffff" font-weight="900" font-family="'Arial Black', sans-serif" font-size="56" dx="14">29</tspan>
    <tspan fill="#888888" dx="10">記事</tspan>
  </text>
</svg>
