<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet">
  <rect width="1600" height="1000" fill="#080808"/>

  <!-- Section label -->
  <text x="800" y="132" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" letter-spacing="14" fill="#00c8ff" font-weight="600">READ TRACKING</text>

  <!-- Article rows with checkmarks -->
  <g transform="translate(180,240)" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif">
    <!-- Row 1: read -->
    <g transform="translate(0,0)">
      <circle cx="40" cy="40" r="38" fill="#00c8ff"/>
      <text x="40" y="59" text-anchor="middle" font-size="50" fill="#000000" font-weight="900">✓</text>
      <text x="120" y="58" font-size="40" fill="#e8e8e8" font-weight="500">STEP2 全体解説：ローエンドは"音作り"…</text>
    </g>
    <!-- Row 2: read -->
    <g transform="translate(0,110)">
      <circle cx="40" cy="40" r="38" fill="#00c8ff"/>
      <text x="40" y="59" text-anchor="middle" font-size="50" fill="#000000" font-weight="900">✓</text>
      <text x="120" y="58" font-size="40" fill="#e8e8e8" font-weight="500">STEP2-1：プロが必ず行う「正しいキック…」</text>
    </g>
    <!-- Row 3: read -->
    <g transform="translate(0,220)">
      <circle cx="40" cy="40" r="38" fill="#00c8ff"/>
      <text x="40" y="59" text-anchor="middle" font-size="50" fill="#000000" font-weight="900">✓</text>
      <text x="120" y="58" font-size="40" fill="#e8e8e8" font-weight="500">STEP2-2：キックを1つに決める…</text>
    </g>
    <!-- Row 4: unread -->
    <g transform="translate(0,330)">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#333333" stroke-width="4"/>
      <text x="120" y="58" font-size="40" fill="#666666" font-weight="500">STEP2-3：キックを4小節に配置する…</text>
    </g>
    <!-- Row 5: unread -->
    <g transform="translate(0,440)">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#333333" stroke-width="4"/>
      <text x="120" y="58" font-size="40" fill="#666666" font-weight="500">STEP2-4：トップベースの作り方…</text>
    </g>
    <!-- Row 6: unread -->
    <g transform="translate(0,550)">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#333333" stroke-width="4"/>
      <text x="120" y="58" font-size="40" fill="#666666" font-weight="500">STEP2-5：サブベースの作り方…</text>
    </g>
  </g>

  <!-- Progress fraction -->
  <text x="800" y="940" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif" font-size="44" letter-spacing="6">
    <tspan fill="#888888" font-weight="500">読了</tspan>
    <tspan fill="#00c8ff" font-weight="900" font-family="'Arial Black', sans-serif" font-size="72" dx="20">3</tspan>
    <tspan fill="#444444" dx="20">/</tspan>
    <tspan fill="#ffffff" font-weight="900" font-family="'Arial Black', sans-serif" font-size="72" dx="20">6</tspan>
  </text>
</svg>
